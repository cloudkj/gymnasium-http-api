<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Gymnasium HTTP Agent</title>
    <link rel="stylesheet" href="style.css">
    <style>
        pre { overflow-x: auto; }
        textarea { box-sizing:border-box; height:300px; overflow-x:auto; padding:1em; resize:vertical; width:100%; }

        button { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; width: 100%; margin-top: 10px; }
        button:hover { background: #0056b3; }
        
        #environment { display: flex; align-items: center; justify-content: center; overflow: hidden; min-height: 300px; }
        #environment span { display: block; background-color: #ddd; height: 300px; width: 100%; }
        #environment img { max-width: 100%; height: auto; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Sample Gymnasium HTTP Agent</h1>
        </div>

        <div class="split-layout">
            <div class="card">
                <h2>Client Code</h2>
                <p>Wrapper for the main environment endpoints:</p>
                <pre id="client-view"></pre>

                <h2>Agent Code</h2>
                <textarea id="agent" spellcheck="false">
// Create an environment and reset state to start a new episode
const env = await Env.make("CartPole-v1");
const initial = await env.reset();
console.log("Starting observation: " + initial.observation);

let episodeOver = false;
let totalReward = 0;

while (!episodeOver) {
    const action = 0; // To the left, to the left
    const state = await env.step(action);
    draw(await env.render());
    totalReward += state.reward;
    episodeOver = state.terminated || state.truncated;
}

console.log("Episode finished! Total reward: " + totalReward);
await env.close();
                </textarea>
                
                <button onclick="runAgent()">Run</button>
            </div>

            <div class="card">
                <h2>Environment</h2>
                <div id="environment">
                    <span>&nbsp;</span>
                    <img style="display: none;" />
                </div>
            </div>
        </div>
    </div>

    <script id="client">
        class Env {
            constructor(instanceId) { this.instanceId = instanceId; }
            static async make(envId, renderMode = "rgb_array") {
                const result = await request('/', 'POST', { env_id: envId, render_mode: renderMode });
                return new Env(result.instance_id);
            }
            reset  = async () => await request(`/${this.instanceId}/reset/`, 'POST', {});
            step   = async (action) => await request(`/${this.instanceId}/step/`, 'POST', { action });
            render = async () => await request(`/${this.instanceId}/monitor/render/`);
            close  = async () => await request(`/${this.instanceId}/`, 'DELETE', {});
        }
    </script>

    <script id="helpers">
        async function request(path, method = 'GET', body = null) {
            const url = `${window.location.origin}/v1/envs` + path;
            const options = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) options.body = JSON.stringify(body);
            const result = await fetch(url, options);
            return await result.json();
        }

        function draw(res) {
            if (res.encoding != "base64") return;
            const render = document.getElementById('environment');
            render.querySelector('span').style.display = 'none';
            const img = render.querySelector('img');
            img.src = `data:${res.content_type};base64,${res.data}`;
            img.style.display = 'block';
        }
    </script>

    <div id="agent-container" style="display: none;"></div>
    <script>
        // Display immutable helper code
        document.getElementById("client-view").textContent = document.getElementById("client").textContent;

        function runAgent() {
            const code = document.getElementById('agent').value;
            const container = document.getElementById('agent-container');

            // Remove any existing dynamically created script element to allow re-execution
            while (container.firstChild) {
                container.removeChild(container.firstChild);
            }

            // Create script element and append to DOM to execute code
            const script = document.createElement('script');
            // Wrap user-defined code in IIAFE to (1) allow for top-level `await` and (2) avoid polluting global scope
            script.textContent = "(async () => {" + code + "})()";
            container.appendChild(script);
        }
    </script>
    
</body>
</html>
